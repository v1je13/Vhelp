services:
  - type: web
    name: travel-diary-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
        sync: false
      - key: PORT
        value: 10000
        sync: false
